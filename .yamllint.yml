extends: relaxed

rules:
  line-length:
    max: 160
    level: warning
  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  comments:
    min-spaces-from-content: 1

ignore: |
  pnpm-lock.yaml
  backend/pnpm-lock.yaml
  image-worker/pnpm-lock.yaml
  node_modules/
  .venv/
  processing/.venv/
  fly-worker/.venv/
