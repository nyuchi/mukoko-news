            type: string
      responses:
        '200':
          description: Story cluster
          content:
            application/json:
              schema:
                type: object
                properties:
                  cluster:
                    type: object
                    properties:
                      source_article:
                        $ref: '#/components/schemas/Article'
                      related_coverage:
                        type: array
                        items:
                          $ref: '#/components/schemas/Article'
                      by_source:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            $ref: '#/components/schemas/Article'
                      source_count:
                        type: integer
                      total_articles:
                        type: integer
        '404':
          $ref: '#/components/responses/NotFound'

  /api/stories/trending:
    get:
      operationId: getTrendingStories
      summary: Trending cross-source stories
      description: |
        Returns keyword-based story clusters where the same topic is covered by
        multiple outlets within the specified time window.
      tags: [Stories]
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
        - name: hours
          in: query
          description: Look-back window in hours
          schema:
            type: integer
            default: 24
            maximum: 168
      responses:
        '200':
          description: Trending story clusters
          content:
            application/json:
              schema:
                type: object
                properties:
                  trending:
                    type: array
                    items:
                      type: object
                      properties:
                        topic:
                          type: string
                        source_count:
                          type: integer
                        article_count:
                          type: integer
                        total_views:
                          type: integer
                        articles:
                          type: array
                          items:
                            $ref: '#/components/schemas/Article'
                  period_hours:
                    type: integer

  # ─── Search ───────────────────────────────────────────────────────────────────

  /api/search:
    get:
      operationId: searchArticles
      summary: Search articles (semantic + keyword fallback)
      description: |
        Tries semantic search via the Python Worker first; falls back to SQL `LIKE`
        keyword matching. Returns search method used (`semantic` or `keyword`).
      tags: [Search]
      security: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: ai
          in: query
          description: Set to `false` to skip semantic search
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Article'
                  query:
                    type: string
                  count:
                    type: integer
                  category:
                    type: string
                  searchMethod:
                    type: string
                    enum: [semantic, keyword]
                  insights:
                    type: array
                    items: {}
                    nullable: true
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/search/authors:
    get:
      operationId: searchAuthors
      summary: Search authors across outlets
      tags: [Search]
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Matching authors
          content:
            application/json:
              schema:
                type: object
                properties:
                  authors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Author'
                  query:
                    type: string
                  total:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/search/by-keyword/{keyword}:
    get:
      operationId: searchByKeyword
      summary: Search articles by keyword slug
      tags: [Search]
      security: []
      parameters:
        - name: keyword
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Articles tagged with keyword
          content:
            application/json:
              schema:
                type: object
                properties:
                  keyword:
                    type: string
                  articles:
                    type: array
                    items:
                      $ref: '#/components/schemas/Article'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /api/search/by-author:
    get:
      operationId: searchByAuthor
      summary: Search articles by author name
      tags: [Search]
      security: []
      parameters:
        - name: author
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Articles by author
          content:
            application/json:
              schema:
                type: object
                properties:
                  author:
                    type: string
                  articles:
                    type: array
                    items:
                      $ref: '#/components/schemas/Article'
                  total:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'

