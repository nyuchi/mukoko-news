      tags: [User]
      security:
        - WorkOSJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [follow_type, follow_id]
              properties:
                follow_type:
                  type: string
                  enum: [source, author, category]
                follow_id:
                  type: string
      responses:
        '200':
          description: Now following
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/user/me/follows/{type}/{id}:
    delete:
      operationId: removeFollow
      summary: Unfollow a source, author, or category
      tags: [User]
      security:
        - WorkOSJWT: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [source, author, category]
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
