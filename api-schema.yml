openapi: 3.0.3
info:
  title: Mukoko News API
  description: |
    Pan-African digital news aggregation platform. "Mukoko" means "Beehive" in Shona.
    Primary market is Zimbabwe with expansion across 16 African countries.

    ## Services

    This schema covers three separate backend services:

    - **Gateway (Cloudflare Worker)** — `news.mukoko.com` — public + user API
    - **Fly.io Pipeline Worker** — `news-ingestion.fly-worker.nyuchi.dev` — data pipeline
    - **Fundi Enrichment Worker** — `news-enrichment.fundi.nyuchi.dev` — AI enrichment

    ## Auth

    Most public read endpoints require no authentication. User-mutation endpoints
    require a WorkOS OIDC JWT as `Authorization: Bearer <token>`.
    The OIDC issuer is `https://identity.nyuchi.com`.

    Admin endpoints (`/api/admin/*`) require the `admin` or `platform-team` role.
    Moderator endpoints (`/api/moderator/*`) require `moderator` role or above.

    The Fly.io `/trigger/collect` endpoint uses a shared bearer token (`FLY_TRIGGER_TOKEN`).
    The Fundi enrichment endpoints use `ENRICHMENT_API_TOKEN`.

  version: 4.0.0
  contact:
    name: Nyuchi Web Services
    url: https://www.nyuchi.com

servers:
  - url: https://news.mukoko.com
    description: Gateway — Cloudflare Worker (production)
  - url: http://localhost:8787
    description: Gateway — local wrangler dev
  - url: https://news-ingestion.fly-worker.nyuchi.dev
    description: Fly.io Pipeline Worker (production)
  - url: https://news-enrichment.fundi.nyuchi.dev
    description: Fundi AI Enrichment Worker (production)

# ─── Security schemes ──────────────────────────────────────────────────────────

components:
  securitySchemes:
    WorkOSJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        WorkOS OIDC JWT issued by `https://identity.nyuchi.com`.
        Required for user-mutation and user-preference endpoints.
    FlyTriggerToken:
      type: http
      scheme: bearer
      description: Shared secret (`FLY_TRIGGER_TOKEN`) for Fly.io pipeline trigger.
    FundiToken:
      type: http
      scheme: bearer
      description: Shared secret (`ENRICHMENT_API_TOKEN`) for Fundi enrichment worker.

# ─── Shared schemas ────────────────────────────────────────────────────────────

  schemas:

    # ── Article (D1 / Gateway representation) ──────────────────────────────────
    Article:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        content_snippet:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        source:
          type: string
          description: News outlet display name
        source_id:
          type: string
        published_at:
          type: string
          format: date-time
        image_url:
          type: string
          format: uri
          nullable: true
        original_url:
          type: string
          format: uri
        category_id:
          type: string
        country_id:
          type: string
          description: ISO 3166-1 alpha-2 country code
          nullable: true
        view_count:
          type: integer
        like_count:
          type: integer
        bookmark_count:
          type: integer
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/Keyword'

    ArticleFull:
      allOf:
        - $ref: '#/components/schemas/Article'
        - type: object
          properties:
            content:
              type: string
              nullable: true
            word_count:
              type: integer
              nullable: true
            reading_time:
              type: integer
              nullable: true
              description: Estimated reading time in seconds

    # ── Keyword ─────────────────────────────────────────────────────────────────
    Keyword:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string

    # ── Pagination envelope ─────────────────────────────────────────────────────
    PaginatedArticles:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean
        countries:
          type: array
          items:
            type: string
          nullable: true

    # ── Error ───────────────────────────────────────────────────────────────────
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        message:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
          nullable: true

    # ── Success (generic) ────────────────────────────────────────────────────────
    Success:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    # ── Comment ─────────────────────────────────────────────────────────────────
    Comment:
      type: object
      properties:
        id:
          type: integer
        article_id:
          type: string
        user_id:
          type: string
        parent_comment_id:
          type: integer
          nullable: true
        content:
          type: string
        like_count:
          type: integer
        reply_count:
          type: integer
        status:
          type: string
          enum: [published, hidden, deleted]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        replies:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
          nullable: true

    # ── Category ────────────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        article_count:
          type: integer

    # ── Country ─────────────────────────────────────────────────────────────────
    Country:
      type: object
      properties:
        id:
          type: string
          description: ISO 3166-1 alpha-2 code (e.g. "ZW")
        name:
          type: string
        flag_emoji:
          type: string
          nullable: true
        enabled:
          type: boolean

    # ── Source (RSS source) ──────────────────────────────────────────────────────
    Source:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        category:
          type: string
        country_id:
          type: string
          nullable: true
        priority:
          type: integer
        article_count:
          type: integer
        latest_article_at:
          type: string
          format: date-time
          nullable: true
        last_fetched_at:
          type: string
          format: date-time
          nullable: true
        fetch_count:
          type: integer
        error_count:
          type: integer

    # ── Author ───────────────────────────────────────────────────────────────────
    Author:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        normalized_name:
          type: string
        bio:
          type: string
          nullable: true
        profile_image_url:
          type: string
          format: uri
          nullable: true
        follower_count:
          type: integer
        article_count:
          type: integer
        is_verified:
          type: boolean

    # ── Story cluster ─────────────────────────────────────────────────────────────
    StoryCluster:
      type: object
      properties:
        id:
          type: string
        primaryArticle:
          $ref: '#/components/schemas/Article'
        relatedArticles:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        articleCount:
          type: integer

    # ── Sectioned feed ────────────────────────────────────────────────────────────
    SectionedFeed:
      type: object
      properties:
        topStories:
          type: array
          items:
            $ref: '#/components/schemas/StoryCluster'
        yourNews:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        byCategory:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              articles:
                type: array
                items:
                  $ref: '#/components/schemas/Article'
        latest:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        countries:
          type: array
          items:
            type: string
          nullable: true
        timestamp:
          type: string
          format: date-time

    # ── User profile ──────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        picture:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
          nullable: true
        role:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Gateway health ────────────────────────────────────────────────────────────
    GatewayHealth:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            database:
              type: string
            processing_api:
              type: string
            analytics:
              type: boolean
            cache:
              type: string
        environment:
          type: string
        security:
          type: object
          additionalProperties: true

    # ── Fly health ───────────────────────────────────────────────────────────────
    FlyHealth:
      type: object
      required: [status, mongodb, uptime_seconds, jobs]
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        mongodb:
          type: string
          enum: [connected, disconnected]
        uptime_seconds:
          type: integer
        jobs:
          type: object
          description: Map of job ID to job metadata
          additionalProperties:
            type: object
            properties:
              name:
                type: string
              next_run:
                type: string
                format: date-time
                nullable: true

    # ── Fundi enrichment response ─────────────────────────────────────────────────
    EnrichResponse:
      type: object
      properties:
        ok:
          type: boolean
        processed:
          type: integer
        errors:
          type: integer
        total:
          type: integer

    # ── Analytics (public) ────────────────────────────────────────────────────────
    PublicAnalytics:
      type: object
      description: Open-data engagement analytics for the /analytics page

    # ── OAuth metadata ────────────────────────────────────────────────────────────
    OAuthMetadata:
      type: object
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        client_id:
          type: string

  # ── Reusable parameters ───────────────────────────────────────────────────────
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 200
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
    Countries:
      name: countries
      in: query
      description: Comma-separated ISO 3166-1 alpha-2 country codes (e.g. `ZW,KE,NG`)
      schema:
        type: string

  # ── Reusable responses ────────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# ─── Tags ──────────────────────────────────────────────────────────────────────

tags:
  - name: System
    description: Health and metadata endpoints
  - name: Feeds
    description: Article feed endpoints (public)
  - name: Articles
    description: Single-article retrieval and engagement
  - name: Stories
    description: Cross-source story clustering
  - name: Search
    description: Full-text and semantic article search
  - name: Sources
    description: News source discovery
  - name: Categories
    description: Category management
  - name: Countries
    description: Pan-African country support
  - name: Keywords
    description: Tag cloud and keyword browsing
  - name: Authors
    description: Author profiles and discovery
  - name: User
    description: Authenticated user preferences and history
  - name: Auth
    description: Authentication metadata
  - name: SEO
    description: Sitemap and metadata endpoints
  - name: MCP
    description: Model Context Protocol server
  - name: Pipeline
    description: Fly.io ingestion pipeline (fly-worker service)
  - name: Enrichment
    description: Fundi AI enrichment worker

# ─── Paths ─────────────────────────────────────────────────────────────────────
# Paths are for the Gateway (news.mukoko.com) unless annotated otherwise.
# Fly.io and Fundi paths are tagged Pipeline / Enrichment and served from their
# respective servers listed above.

paths:

  # ─── System ───────────────────────────────────────────────────────────────────

  /api/health:
    get:
      operationId: getHealth
      summary: Gateway health check
      description: Returns service status for the Cloudflare Worker gateway and its dependencies.
      tags: [System]
      security: []
      responses:
        '200':
          description: Health status (check `status` field — may be degraded even on 200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayHealth'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/stats:
    get:
      operationId: getPublicStats
      summary: Public platform statistics
      description: |
        Aggregate article/source/category counts. Tries MongoDB (Python Worker) first,
        falls back to D1.
      tags: [System]
      security: []
      responses:
        '200':
          description: Platform statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  database:
                    type: object
                    properties:
                      total_articles:
                        type: integer
                      active_sources:
                        type: integer
                      categories:
                        type: integer
                      today_articles:
                        type: integer
                  source:
                    type: string
                    description: Which data store served the response
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/ServerError'

  /api/analytics:
    get:
      operationId: getPublicAnalytics
      summary: Open-data engagement analytics
      description: |
        MongoDB-backed analytics aggregation powering the `/analytics` page.
        Returns aggregate engagement data; no personally identifiable data.
      tags: [System]
      security: []
      responses:
        '200':
          description: Engagement analytics data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicAnalytics'

  /api/manifest.json:
    get:
      operationId: getPwaManifest
      summary: Dynamic PWA manifest
      description: Returns a Web App Manifest with category-based shortcuts.
      tags: [System]
      security: []
      responses:
        '200':
          description: PWA manifest
          content:
            application/manifest+json:
              schema:
                type: object

  /.well-known/oauth-authorization-server:
    get:
      operationId: getOAuthMetadata
      summary: OAuth 2.0 Authorization Server Metadata (RFC 8414)
      description: |
        Used by MCP clients (Claude Desktop etc.) to discover the WorkOS PKCE
        authorization server at `https://identity.nyuchi.com`.
      tags: [Auth]
      security: []
      responses:
        '200':
          description: OAuth server metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthMetadata'

  # ─── Feeds ────────────────────────────────────────────────────────────────────

  /api/feeds:
    get:
      operationId: getFeeds
      summary: List articles
      description: |
        Returns paginated published articles from D1. Supports filtering by category,
        country, and sort order.
      tags: [Feeds]
      security: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Countries'
        - name: category
          in: query
          description: Filter by category ID
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order
          schema:
            type: string
            enum: [latest, trending, popular]
            default: latest
      responses:
        '200':
          description: Paginated article list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArticles'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/feeds/personalized:
    get:
      operationId: getPersonalizedFeed
      summary: Personalized feed
      description: |
        Returns articles ranked by the user's reading history, follows, and preferences.
        Falls back to recency if no user context is available.
      tags: [Feeds]
      security:
        - WorkOSJWT: []
        - {}
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Countries'
        - name: excludeRead
          in: query
          schema:
            type: boolean
            default: true
        - name: diversity
          in: query
          description: Diversity factor 0–1 (higher = more category variety)
          schema:
            type: number
            minimum: 0
            maximum: 1
            default: 0.3
      responses:
        '200':
          description: Personalized paginated feed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedArticles'
                  - type: object
                    properties:
                      isPersonalized:
                        type: boolean
                      countries:
                        type: array
                        items:
                          type: string
                        nullable: true
        '500':
          $ref: '#/components/responses/ServerError'

  /api/feeds/personalized/explain:
    get:
      operationId: explainPersonalizedFeed
      summary: Feed explanation
      description: Returns why articles are recommended to the current user.
      tags: [Feeds]
      security:
        - WorkOSJWT: []
        - {}
      responses:
        '200':
          description: Feed explanation
          content:
            application/json:
              schema:
                type: object
                properties:
                  isPersonalized:
                    type: boolean
                  message:
                    type: string
                    nullable: true
                  sources:
                    type: array
                    items: {}
                  authors:
                    type: array
                    items: {}
                  categories:
                    type: array
                    items: {}
                  topInterests:
                    type: array
                    items: {}
        '500':
          $ref: '#/components/responses/ServerError'

  /api/feeds/sectioned:
    get:
      operationId: getSectionedFeed
      summary: Sectioned feed (Google News-style)
      description: |
        Returns three sections in a single response:
        - `topStories` — clustered by topic (Jaccard or Python Worker similarity)
        - `yourNews` — filtered by preferred categories
        - `byCategory` — up to 5 category sections
        - `latest` — most recent articles
      tags: [Feeds]
      security: []
      parameters:
        - $ref: '#/components/parameters/Countries'
        - name: categories
          in: query
          description: Comma-separated preferred category IDs
          schema:
            type: string
      responses:
        '200':
          description: Sectioned feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionedFeed'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/news-bytes:
    get:
      operationId: getNewsBytes
      summary: News Bytes (image-only feed)
      description: TikTok-style feed returning only articles that have a cover image.
      tags: [Feeds]
      security: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Image-rich article feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArticles'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/refresh:
    post:
      operationId: triggerUserRefresh
      summary: User-initiated feed refresh
      description: |
        Triggers an RSS collection run via the Python Worker (ProcessingClient).
        Rate limited to once per 5 minutes per user or IP. Returns counts of new articles.
      tags: [Feeds]
      security:
        - WorkOSJWT: []
        - {}
      responses:
        '200':
          description: Refresh result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newArticles:
                    type: integer
                  timestamp:
                    type: string
                    format: date-time
        '429':
          description: Rate limit — wait before retrying
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  retryAfter:
                    type: integer
                    description: Seconds to wait before next refresh
        '500':
          $ref: '#/components/responses/ServerError'

  /api/feed/collect:
    post:
      operationId: collectFeed
      summary: Collect feeds (user-initiated, 5-min cooldown)
      description: |
        Delegates RSS collection to the Python Worker. Per-IP rate limit of one request
        per 5 minutes. Returns new article count and processing time.
      tags: [Feeds]
      security: []
      responses:
        '200':
          description: Collection result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newArticles:
                    type: integer
                  errors:
                    type: integer
                  processing_time_ms:
                    type: integer
                  timestamp:
                    type: string
                    format: date-time
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/feed/initialize-sources:
    post:
      operationId: initializeSources
      summary: Seed Pan-African RSS sources
      description: |
        Idempotent — seeds all 16 African country sources. Skips already-existing records.
        Intended for initial setup. No auth required.
      tags: [Sources]
      security: []
      responses:
        '200':
          description: Initialization result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  added:
                    type: integer
                  failed:
                    type: integer
                  details:
                    type: array
                    items:
                      type: string
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/ServerError'

  # ─── Articles ──────────────────────────────────────────────────────────────────

  /api/article/{id}:
    get:
      operationId: getArticleById
      summary: Get article by ID
      description: Returns full article including content, keywords, and reading metadata. Increments view count.
      tags: [Articles]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Article detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  article:
                    $ref: '#/components/schemas/ArticleFull'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/article/by-source-slug:
    get:
      operationId: getArticleBySourceSlug
      summary: Get article by source + slug
      description: Looks up an article using its `source` name and `slug` URL segment.
      tags: [Articles]
      security: []
      parameters:
        - name: source
          in: query
          required: true
          schema:
            type: string
        - name: slug
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Article detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  article:
                    $ref: '#/components/schemas/ArticleFull'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/article/{id}/related:
    get:
      operationId: getRelatedArticles
      summary: Get related articles
      description: |
        Returns up to `limit` articles scored by shared keywords, same category,
        and cross-source coverage within a 30-day window.
      tags: [Articles]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
            maximum: 20
      responses:
        '200':
          description: Related articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  related:
                    type: array
                    items:
                      $ref: '#/components/schemas/Article'
                  source_article_id:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/articles/{id}/like:
    post:
      operationId: likeArticle
      summary: Like / unlike an article
      description: Toggles like status for the authenticated user. Returns new liked state.
      tags: [Articles]
      security:
        - WorkOSJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Like toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  liked:
                    type: boolean
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/articles/{id}/save:
    post:
      operationId: saveArticle
      summary: Save / unsave (bookmark) an article
      description: Toggles bookmark status for the authenticated user.
      tags: [Articles]
      security:
        - WorkOSJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bookmark toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  saved:
                    type: boolean
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/articles/{id}/view:
    post:
      operationId: trackArticleView
      summary: Track article view
      description: |
        Records reading time and scroll depth. Anonymous views are counted; JWT
        attaches the view to a user account.
      tags: [Articles]
      security:
        - WorkOSJWT: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reading_time:
                  type: integer
                  description: Seconds spent reading
                  default: 0
                scroll_depth:
                  type: integer
                  description: Scroll percentage 0–100
                  default: 0
      responses:
        '200':
          description: View tracked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/articles/{id}/comment:
    post:
      operationId: postComment
      summary: Post a comment on an article
      description: Requires authentication. Comments max 1000 characters. Supports threaded replies.
      tags: [Articles]
      security:
        - WorkOSJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 1000
                parent_comment_id:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Comment posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  commentId:
                    type: integer
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/articles/{id}/comments:
    get:
      operationId: getArticleComments
      summary: Get comments for an article
      description: Returns top-level comments and up to 10 replies each.
      tags: [Articles]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Comment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  # ─── Stories ──────────────────────────────────────────────────────────────────

  /api/stories/cluster/{articleId}:
    get:
      operationId: getStoryCluster
      summary: Get cross-source story cluster
      description: |
        Finds articles about the same story (matching content hash, shared keywords,
        same category within ±3 days). Groups results by source.
      tags: [Stories]
      security: []
      parameters:
        - name: articleId
          in: path
