        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Follow status toggled
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── User ─────────────────────────────────────────────────────────────────────

  /api/user/{username}:
