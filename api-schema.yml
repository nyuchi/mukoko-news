            type: integer
            default: 10
      responses:
        '200':
          description: Featured author list
          content:
            application/json:
              schema:
                type: object
                properties:
                  featured_authors:
                    type: array
                    items:
                      $ref: '#/components/schemas/Author'
                  message:
                    type: string

  /api/trending-authors:
    get:
      operationId: getTrendingAuthors
      summary: Trending authors
