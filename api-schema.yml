  # ─── Fly.io Pipeline Worker ────────────────────────────────────────────────────
  # Base URL: https://news-ingestion.fly-worker.nyuchi.dev
  # Note: paths below are served from the Fly.io server, not the gateway.
  # The x-server-url extension clarifies the base URL for each path.

  /pipeline/health:
    get:
      operationId: flyHealth
      summary: Fly.io pipeline health check
      description: |
        **Actual path**: `GET /health`
        **Server**: `https://news-ingestion.fly-worker.nyuchi.dev`

        Returns MongoDB connectivity, uptime, and APScheduler job next-run times.
      tags: [Pipeline]
      security: []
      servers:
        - url: https://news-ingestion.fly-worker.nyuchi.dev
          description: Fly.io Pipeline Worker (production)
      responses:
        '200':
          description: Pipeline health (status may be `degraded` even on 200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlyHealth'

  /trigger/collect:
    post:
      operationId: triggerCollect
      summary: On-demand RSS collection (pipeline)
      description: |
        **Server**: `https://news-ingestion.fly-worker.nyuchi.dev`

        Triggers an immediate RSS collection run in the background.
        Responds with HTTP 202 immediately — the collection runs asynchronously.

        **Rate limit**: 3 triggers per minute globally (sliding window).
        **Auth**: `Authorization: Bearer <FLY_TRIGGER_TOKEN>`
      tags: [Pipeline]
      security:
        - FlyTriggerToken: []
      servers:
        - url: https://news-ingestion.fly-worker.nyuchi.dev
          description: Fly.io Pipeline Worker (production)
      responses:
        '202':
          description: Collection accepted and running in background
          content:
            application/json:
              schema:
                type: object
                required: [ok, message]
                properties:
                  ok:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Collection triggered
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Unauthorized
        '429':
          description: Rate limit exceeded (3/min)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Rate limit exceeded — 3 triggers/min

  # ─── Fundi Enrichment Worker ───────────────────────────────────────────────────
  # Base URL: https://news-enrichment.fundi.nyuchi.dev

  /enrichment/health:
    get:
      operationId: fundiHealth
      summary: Fundi enrichment health check
      description: |
        **Actual path**: `GET /health`
        **Server**: `https://news-enrichment.fundi.nyuchi.dev`

        Simple liveness check.
      tags: [Enrichment]
      security: []
      servers:
        - url: https://news-enrichment.fundi.nyuchi.dev
          description: Fundi AI Enrichment Worker (production)
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: fundi-news-enrichment

  /api/enrich:
    post:
      operationId: enrichArticles
      summary: AI-enrich a batch of articles
      description: |
        **Server**: `https://news-enrichment.fundi.nyuchi.dev`

        Accepts up to 50 article IDs from MongoDB `news.articles` where
        `aiProcessed != true`. For each article runs:
        - Claude AI NLP (summary, sentiment, keywords, named entities, categories, quality score)
        - BGE-M3 vector embedding (stored as `embedding` field)

        Updates each article in-place in MongoDB. Idempotent — already-processed
        articles are skipped.

        **Auth**: `Authorization: Bearer <ENRICHMENT_API_TOKEN>`
      tags: [Enrichment]
      security:
        - FundiToken: []
      servers:
        - url: https://news-enrichment.fundi.nyuchi.dev
          description: Fundi AI Enrichment Worker (production)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [articleIds]
              properties:
                articleIds:
                  type: array
                  items:
                    type: string
                  description: MongoDB article `_id` values to enrich
                  maxItems: 50
                source:
                  type: string
                  enum: [rss, newsdata_api, manual]
                  nullable: true
                priority:
                  type: string
                  enum: [high, normal, low]
                  default: normal
      responses:
        '200':
          description: Enrichment summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichResponse'
        '400':
          description: No articleIds provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/enrich/org:
    post:
      operationId: enrichOrganization
      summary: Enrich a media organization / entity
      description: |
        **Server**: `https://news-enrichment.fundi.nyuchi.dev`

        Proxies to `fundi-ingestion.nyuchi.dev/api/enrich/entity` for place and
        entity enrichment. Returns the upstream response wrapped in `{ ok, result }`.

        **Auth**: `Authorization: Bearer <ENRICHMENT_API_TOKEN>`
      tags: [Enrichment]
      security:
        - FundiToken: []
      servers:
        - url: https://news-enrichment.fundi.nyuchi.dev
          description: Fundi AI Enrichment Worker (production)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entityId, mediaOrgId, name, countryCode, schemaOrgType]
              properties:
                entityId:
                  type: string
                mediaOrgId:
                  type: string
                name:
                  type: string
                url:
                  type: string
                  format: uri
                  nullable: true
                countryCode:
                  type: string
                  description: ISO 3166-1 alpha-2
                schemaOrgType:
                  type: string
                  description: Schema.org `@type` (e.g. `NewsMediaOrganization`)
      responses:
        '200':
          description: Upstream enrichment result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  result:
                    type: object
                    additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Fundi ingestion service unavailable or not configured

security: []

