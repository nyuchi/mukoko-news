openapi: 3.0.3
info:
  title: Mukoko News API
  description: |
    Pan-African digital news aggregation API. Mukoko means "Beehive" in Shona —
    where community gathers and stores knowledge. Aggregates news from 56+ sources
    across 16 African countries with AI-powered categorization, semantic search,
    and story clustering.

    All article fields follow [Schema.org NewsArticle](https://schema.org/NewsArticle) naming conventions.

    ## Authentication

    Public read endpoints require a bearer token (`API_SECRET`). Set it via the
    `Authorization: Bearer <token>` header. User-specific endpoints additionally
    accept OIDC JWTs from `id.mukoko.com`.

    ## Rate Limits

    Rate limits are enforced per-IP via KV-backed sliding windows.

    ## MCP Server

    An [MCP server](https://modelcontextprotocol.io) is available at
    `mcp-server/` for AI-powered news workflows.
  version: 4.0.0
  contact:
    name: Nyuchi Africa
    url: https://www.nyuchi.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://mukoko-news-backend.nyuchi.workers.dev/api
    description: Production (Cloudflare Workers)
  - url: http://localhost:8787/api
    description: Local development

tags:
  - name: Articles
    description: News article retrieval and feeds
  - name: Search
    description: Full-text and semantic search
  - name: Discovery
    description: Trending topics, categories, keywords
  - name: Sources
    description: News source directory
  - name: Countries
    description: Pan-African country data
  - name: Authors
    description: Author profiles
  - name: Engagement
    description: Article interactions (like, save, view)
  - name: User
    description: User profile and preferences
  - name: System
    description: Health and platform stats

security:
  - BearerAuth: []

paths:
  # ─── System ───────────────────────────────────────────────────────────

  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [System]
      security: []
      responses:
        '200':
          description: API health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /stats:
    get:
      summary: Platform statistics
      operationId: getStats
      tags: [System]
      responses:
        '200':
          description: Aggregate platform stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'

  # ─── Articles ─────────────────────────────────────────────────────────

  /feeds:
    get:
      summary: List articles
      description: |
        Paginated article feed with optional filtering by category, country,
        and sort order. Returns articles with engagement counts and keywords.
      operationId: listArticles
      tags: [Articles]
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CategoryParam'
        - $ref: '#/components/parameters/CountriesParam'
        - name: sort
          in: query
          schema:
            type: string
            enum: [latest, trending, popular]
            default: latest
      responses:
        '200':
          description: Paginated article list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /feeds/sectioned:
    get:
      summary: Sectioned feed
      description: |
        Returns articles grouped into sections: top stories (clustered),
        personalised "your news", by-category sections, and latest.
        Used by the main app home page.
      operationId: getSectionedFeed
      tags: [Articles]
      parameters:
        - $ref: '#/components/parameters/CountriesParam'
        - name: categories
          in: query
          description: Comma-separated category slugs
          schema:
            type: string
      responses:
        '200':
          description: Sectioned feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectionedFeedResponse'

  /article/{articleId}:
    get:
      summary: Get article
      description: Returns full article content including body, word count, and reading time.
      operationId: getArticle
      tags: [Articles]
      parameters:
        - $ref: '#/components/parameters/ArticleIdParam'
      responses:
        '200':
          description: Full article
          content:
            application/json:
              schema:
                type: object
                required: [article]
                properties:
                  article:
                    $ref: '#/components/schemas/ArticleFull'
        '404':
          $ref: '#/components/responses/NotFound'

  /article/{articleId}/related:
    get:
      summary: Related articles
      description: Returns articles related to the given article via story clustering.
      operationId: getRelatedArticles
      tags: [Articles]
      parameters:
        - $ref: '#/components/parameters/ArticleIdParam'
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Related articles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelatedArticlesResponse'

  /news-bytes:
    get:
      summary: NewsBytes feed
      description: Short-form news articles optimised for vertical/TikTok-style consumption.
      operationId: getNewsBytes
      tags: [Articles]
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/CategoryParam'
      responses:
        '200':
          description: NewsBytes articles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleListResponse'

  # ─── Search ───────────────────────────────────────────────────────────

  /search:
    get:
      summary: Search articles
      description: |
        Full-text and semantic search. When AI search is enabled, uses Vectorize
        for semantic matching; falls back to keyword search otherwise.
      operationId: searchArticles
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
            minLength: 1
        - $ref: '#/components/parameters/CategoryParam'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
        - name: ai
          in: query
          description: Enable semantic search (default true)
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ─── Discovery ────────────────────────────────────────────────────────

  /stories/trending:
    get:
      summary: Trending stories
      description: |
        Returns trending story clusters — groups of articles about the same topic
        from multiple sources, ranked by aggregate engagement.
      operationId: getTrendingStories
      tags: [Discovery]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
        - name: hours
          in: query
          description: Lookback window in hours
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 168
        - name: country
          in: query
          description: Filter by country code
          schema:
            type: string
      responses:
        '200':
          description: Trending stories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendingResponse'

  /categories:
    get:
      summary: List categories
      description: Returns all news categories with article counts.
      operationId: listCategories
      tags: [Discovery]
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'

  /keywords:
    get:
      summary: Trending keywords
      description: Returns trending keywords/topics ranked by article count.
      operationId: listKeywords
      tags: [Discovery]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 32
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Keyword list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeywordsResponse'

  # ─── Sources ──────────────────────────────────────────────────────────

  /sources:
    get:
      summary: List news sources
      description: |
        Returns all enabled news sources with article counts, health status,
        and fetch metadata.
      operationId: listSources
      tags: [Sources]
      responses:
        '200':
          description: Source list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourcesResponse'

  # ─── Countries ────────────────────────────────────────────────────────

  /countries:
    get:
      summary: List countries
      description: Returns all 16 supported African countries.
      operationId: listCountries
      tags: [Countries]
      parameters:
        - name: withStats
          in: query
          description: Include article count stats per country
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Country list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountriesResponse'

  /countries/{countryId}:
    get:
      summary: Get country
      operationId: getCountry
      tags: [Countries]
      parameters:
        - name: countryId
          in: path
          required: true
          description: ISO 3166-1 alpha-2 country code
          schema:
            type: string
            minLength: 2
            maxLength: 2
            example: ZW
      responses:
        '200':
          description: Country details
          content:
            application/json:
              schema:
                type: object
                properties:
                  country:
                    $ref: '#/components/schemas/Country'

  /countries/stats/articles:
    get:
      summary: Article counts by country
      operationId: getCountryArticleStats
      tags: [Countries]
      responses:
        '200':
          description: Article counts per country
          content:
            application/json:
              schema:
                type: object

  # ─── Authors ──────────────────────────────────────────────────────────

  /authors:
    get:
      summary: List authors
      operationId: listAuthors
      tags: [Authors]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: outlet
          in: query
          description: Filter by publication
          schema:
            type: string
      responses:
        '200':
          description: Author list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorsResponse'

  /author/{slug}:
    get:
      summary: Get author profile
      operationId: getAuthor
      tags: [Authors]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Author profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorProfileResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /featured-authors:
    get:
      summary: Featured authors
      operationId: getFeaturedAuthors
      tags: [Authors]
      responses:
        '200':
          description: Featured author list
          content:
            application/json:
              schema:
                type: object

  /trending-authors:
    get:
      summary: Trending authors
      operationId: getTrendingAuthors
      tags: [Authors]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        '200':
          description: Trending author list
          content:
            application/json:
              schema:
                type: object

  # ─── Engagement ───────────────────────────────────────────────────────

  /articles/{articleId}/like:
    post:
      summary: Like an article
      operationId: likeArticle
      tags: [Engagement]
      parameters:
        - $ref: '#/components/parameters/ArticleIdParam'
      responses:
        '200':
          description: Like toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  liked:
                    type: boolean
                  like_count:
                    type: integer

  /articles/{articleId}/save:
    post:
      summary: Save/bookmark an article
      operationId: saveArticle
      tags: [Engagement]
      parameters:
        - $ref: '#/components/parameters/ArticleIdParam'
      responses:
        '200':
          description: Save toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved:
                    type: boolean
                  bookmark_count:
                    type: integer

  /articles/{articleId}/view:
    post:
      summary: Record article view
      operationId: viewArticle
      tags: [Engagement]
      parameters:
        - $ref: '#/components/parameters/ArticleIdParam'
      responses:
        '200':
          description: View recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  view_count:
                    type: integer

  # ─── User ─────────────────────────────────────────────────────────────

  /user/me/preferences:
    get:
      summary: Get user preferences
      operationId: getUserPreferences
      tags: [User]
      responses:
        '200':
          description: User preferences
          content:
            application/json:
              schema:
                type: object
    post:
      summary: Update user preferences
      operationId: updateUserPreferences
      tags: [User]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                type: object

  /user/bookmarks:
    get:
      summary: Get bookmarked articles
      operationId: getUserBookmarks
      tags: [User]
      responses:
        '200':
          description: Bookmarked articles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleListResponse'

  /user/history:
    get:
      summary: Get reading history
      operationId: getUserHistory
      tags: [User]
      responses:
        '200':
          description: Reading history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleListResponse'

# ═══════════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════════

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        API secret token (for frontend/server clients) or OIDC JWT from id.mukoko.com (for authenticated users).

  parameters:
    ArticleIdParam:
      name: articleId
      in: path
      required: true
      description: Article UUID
      schema:
        type: string
        format: uuid

    LimitParam:
      name: limit
      in: query
      description: Maximum items to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    OffsetParam:
      name: offset
      in: query
      description: Pagination offset
      schema:
        type: integer
        minimum: 0
        default: 0

    CategoryParam:
      name: category
      in: query
      description: Filter by category slug
      schema:
        type: string

    CountriesParam:
      name: countries
      in: query
      description: Comma-separated ISO 3166-1 alpha-2 country codes
      schema:
        type: string
        example: ZW,KE,NG

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ── Core Models (Schema.org NewsArticle) ────────────────────────────

    Article:
      type: object
      description: |
        A news article. Field names follow [Schema.org NewsArticle](https://schema.org/NewsArticle) conventions.
      required:
        - id
        - headline
        - slug
        - date_published
      properties:
        id:
          type: string
          format: uuid
          description: Unique article identifier
        headline:
          type: string
          description: "schema:headline — Article title"
          example: "Zimbabwe Economy Shows Signs of Recovery"
        slug:
          type: string
          description: "schema:url — URL-safe slug"
          example: "zimbabwe-economy-shows-signs-of-recovery"
        description:
          type: string
          nullable: true
          description: "schema:description — Summary or excerpt"
        content_snippet:
          type: string
          nullable: true
          description: Short preview of article body
        author_name:
          type: string
          nullable: true
          description: "schema:author name (denormalized)"
        publisher_name:
          type: string
          nullable: true
          description: "schema:publisher name (denormalized)"
          example: "Herald Zimbabwe"
        publisher_id:
          type: string
          nullable: true
          description: Foreign key to the news source
        date_published:
          type: string
          format: date-time
          description: "schema:datePublished — ISO 8601"
          example: "2026-03-14T10:30:00Z"
        image:
          type: string
          format: uri
          nullable: true
          description: "schema:image — Primary article image URL"
        main_entity_of_page:
          type: string
          format: uri
          nullable: true
          description: "schema:mainEntityOfPage — Original source URL"
        article_section_id:
          type: string
          nullable: true
          description: "schema:articleSection — Category slug"
          example: "economy"
        about_country_id:
          type: string
          nullable: true
          description: "schema:about — ISO 3166-1 alpha-2 country code"
          example: "ZW"
        view_count:
          type: integer
          default: 0
          description: "schema:interactionStatistic — Total views"
        like_count:
          type: integer
          default: 0
          description: "schema:interactionStatistic — Total likes"
        bookmark_count:
          type: integer
          default: 0
          description: "schema:interactionStatistic — Total bookmarks"
        keywords:
          type: array
          items:
            $ref: '#/components/schemas/Keyword'
          description: "schema:keywords — Associated keywords"

    ArticleFull:
      description: Full article with body content. Extends Article.
      allOf:
        - $ref: '#/components/schemas/Article'
        - type: object
          properties:
            article_body:
              type: string
              nullable: true
              description: "schema:articleBody — Full HTML content"
            date_modified:
              type: string
              format: date-time
              nullable: true
              description: "schema:dateModified"
            word_count:
              type: integer
              nullable: true
              description: "schema:wordCount"
            reading_time_minutes:
              type: integer
              nullable: true
              description: Estimated reading time in minutes
            comment_count:
              type: integer
              default: 0
            quality_score:
              type: number
              nullable: true
              description: AI-computed content quality score (0-100)
            engagement_score:
              type: number
              nullable: true
              description: Computed engagement score with time decay
            in_language:
              type: string
              nullable: true
              description: "schema:inLanguage — ISO 639-1 code"
              example: "en"
            isLiked:
              type: boolean
              description: Whether the current user has liked this article
            isSaved:
              type: boolean
              description: Whether the current user has bookmarked this article

    Keyword:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: integer
        name:
          type: string
          example: "inflation"
        slug:
          type: string
          example: "inflation"

    # ── Story Clustering ────────────────────────────────────────────────

    StoryCluster:
      type: object
      description: A group of related articles from different sources covering the same story.
      required:
        - id
        - primaryArticle
        - relatedArticles
        - articleCount
      properties:
        id:
          type: string
        primaryArticle:
          $ref: '#/components/schemas/Article'
        relatedArticles:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        articleCount:
          type: integer
          minimum: 1

    # ── Category ────────────────────────────────────────────────────────

    Category:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
        name:
          type: string
          example: "Politics"
        slug:
          type: string
          example: "politics"
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        article_count:
          type: integer
          default: 0

    # ── Country ─────────────────────────────────────────────────────────

    Country:
      type: object
      required: [id, name, code, flag_emoji]
      properties:
        id:
          type: string
        name:
          type: string
          example: "Zimbabwe"
        code:
          type: string
          description: ISO 3166-1 alpha-2
          minLength: 2
          maxLength: 2
          example: "ZW"
        flag_emoji:
          type: string
          example: "\U0001F1FF\U0001F1FC"
        enabled:
          type: boolean

    # ── News Source ──────────────────────────────────────────────────────

    Source:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
          example: "Herald Zimbabwe"
        url:
          type: string
          format: uri
          description: Publication website URL
        category:
          type: string
          description: Default category for this source
        country_id:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: "ZW"
        priority:
          type: integer
          description: Source priority (lower = higher priority)
        last_fetched_at:
          type: string
          format: date-time
          nullable: true
        fetch_count:
          type: integer
        error_count:
          type: integer
        last_error:
          type: string
          nullable: true
        article_count:
          type: integer
          description: Total articles from this source
        latest_article_at:
          type: string
          format: date-time
          nullable: true

    # ── Author ──────────────────────────────────────────────────────────

    Author:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: integer
        name:
          type: string
          description: "schema:name"
        slug:
          type: string
        email:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
          description: "schema:description"
        image:
          type: string
          format: uri
          nullable: true
          description: "schema:image"
        article_count:
          type: integer

    # ── Response Wrappers ───────────────────────────────────────────────

    ArticleListResponse:
      type: object
      required: [articles, total, limit, offset, hasMore]
      properties:
        articles:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean
        countries:
          type: array
          items:
            type: string
          description: Country codes applied as filter (if any)

    SectionedFeedResponse:
      type: object
      required: [topStories, yourNews, byCategory, latest, timestamp]
      properties:
        topStories:
          type: array
          items:
            $ref: '#/components/schemas/StoryCluster'
        yourNews:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        byCategory:
          type: array
          items:
            type: object
            required: [id, name, articles]
            properties:
              id:
                type: string
              name:
                type: string
              articles:
                type: array
                items:
                  $ref: '#/components/schemas/Article'
        latest:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        countries:
          type: array
          items:
            type: string
        timestamp:
          type: string
          format: date-time

    SearchResponse:
      type: object
      required: [results, query, count]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Article'
        query:
          type: string
        count:
          type: integer
        category:
          type: string
        searchMethod:
          type: string
          enum: [semantic, keyword]

    TrendingResponse:
      type: object
      required: [trending, period_hours]
      properties:
        trending:
          type: array
          items:
            type: object
            required: [topic, source_count, article_count, total_views, articles]
            properties:
              topic:
                type: string
              source_count:
                type: integer
              article_count:
                type: integer
              total_views:
                type: integer
              articles:
                type: array
                items:
                  $ref: '#/components/schemas/Article'
        period_hours:
          type: integer

    RelatedArticlesResponse:
      type: object
      required: [related, source_article_id]
      properties:
        related:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Article'
              - type: object
                properties:
                  relevance_score:
                    type: number
                  is_cross_source:
                    type: integer
        source_article_id:
          type: string

    CategoriesResponse:
      type: object
      required: [categories]
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    KeywordsResponse:
      type: object
      required: [keywords, total]
      properties:
        keywords:
          type: array
          items:
            type: object
            required: [id, name, slug, article_count]
            properties:
              id:
                type: integer
              name:
                type: string
              slug:
                type: string
              type:
                type: string
              article_count:
                type: integer
        total:
          type: integer

    SourcesResponse:
      type: object
      required: [sources, total]
      properties:
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
        total:
          type: integer

    CountriesResponse:
      type: object
      required: [countries]
      properties:
        countries:
          type: array
          items:
            $ref: '#/components/schemas/Country'

    AuthorsResponse:
      type: object
      required: [authors, total, limit]
      properties:
        authors:
          type: array
          items:
            $ref: '#/components/schemas/Author'
        total:
          type: integer
        limit:
          type: integer

    AuthorProfileResponse:
      type: object
      required: [author]
      properties:
        author:
          $ref: '#/components/schemas/Author'
        journalism_recognition:
          type: string
        profile_features:
          type: array
          items:
            type: string

    # ── System ──────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [status, timestamp, services]
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          example: "healthy"
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            database:
              type: string
              enum: [operational, error]
            analytics:
              type: boolean
            cache:
              type: string
            articles:
              type: string
            newsSources:
              type: string
        environment:
          type: string
        security:
          type: object
          properties:
            apiAuthEnabled:
              type: boolean
            authMethods:
              type: array
              items:
                type: string
            protectedRoutes:
              type: string
            publicRoutes:
              type: string

    StatsResponse:
      type: object
      required: [database, timestamp]
      properties:
        database:
          type: object
          required: [total_articles, active_sources, categories]
          properties:
            total_articles:
              type: integer
            active_sources:
              type: integer
            categories:
              type: integer
            today_articles:
              type: integer
        timestamp:
          type: string
          format: date-time

    # ── Errors ──────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error type or summary
          example: "Not found"
        message:
          type: string
          description: Human-readable detail
          example: "Article with ID abc123 not found"
        details:
          type: string
          description: Technical detail (development only)
        timestamp:
          type: string
          format: date-time

externalDocs:
  description: Mukoko News GitHub Repository
  url: https://github.com/nyuchitech/mukoko-news
