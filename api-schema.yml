        '404':
          $ref: '#/components/responses/NotFound'

  /api/user/{username}/likes:
    get:
      operationId: getUserLikes
      summary: Get user's liked articles
      description: Requires the requester to be the same user (WorkOS JWT).
      tags: [User]
      security:
        - WorkOSJWT: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Liked article list
          content:
            application/json:
              schema:
                type: object
                properties:
                  likes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Article'
                  total:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/user/{username}/history:
    get:
      operationId: getUserHistory
      summary: Get user's reading history
      description: Requires the requester to be the same user (WorkOS JWT).
      tags: [User]
      security:
        - WorkOSJWT: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Reading history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Article'
