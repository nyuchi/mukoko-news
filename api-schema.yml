      tags: [User]
      security:
        - WorkOSJWT: []
      requestBody:
        description: Key/value preference map
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /api/user/me/follows:
    get:
      operationId: getAllFollows
      summary: Get all follows (authors, sources, categories)
      tags: [User]
      security:
        - WorkOSJWT: []
      responses:
        '200':
          description: Combined follows
          content:
            application/json:
              schema:
                type: object
                properties:
                  follows:
                    type: object
                    properties:
                      authors:
                        type: array
                        items:
                          type: string
                      sources:
                        type: array
                        items:
                          type: string
                      categories:
                        type: array
                        items:
                          type: string
    post:
      operationId: addFollow
