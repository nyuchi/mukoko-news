name: Deploy Mukoko News

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend (Next.js)
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - run: npm run test
    - run: npm run typecheck
    - run: npm run lint
    - run: npm run build

  test-cf-worker:
    runs-on: ubuntu-latest
    name: Test CF Worker (Typecheck)
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'
    - run: cd backend && npm install
    - run: cd backend && npm run typecheck

  test-fly-worker:
    runs-on: ubuntu-latest
    name: Test Fly Worker (Python API)
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: cd fly-worker && pip install -e ".[dev]"
    - run: cd fly-worker && pytest

  deploy-cf-worker:
    runs-on: ubuntu-latest
    name: Deploy CF Worker
    needs: [test-frontend, test-cf-worker]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'
    - run: cd backend && npm install
    - name: Deploy to Cloudflare
      run: cd backend && npm run deploy
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  health-check:
    runs-on: ubuntu-latest
    name: Health Check
    needs: deploy-cf-worker
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Test Fly.io API health
      run: |
        max_retries=3
        retry_count=0
        while [ $retry_count -lt $max_retries ]; do
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: GitHub-Actions-Health-Check" \
            -H "Accept: application/json" \
            https://mukoko-news-api.fly.dev/api/health)
          if [ $response -eq 200 ]; then
            echo "Fly.io API is healthy!"
            exit 0
          fi
          retry_count=$((retry_count + 1))
          if [ $retry_count -lt $max_retries ]; then
            echo "Attempt $retry_count failed (HTTP $response), retrying in 10s..."
            sleep 10
          fi
        done
        echo "Health check failed after $max_retries attempts (HTTP $response)"
        exit 1
