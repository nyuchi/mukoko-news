name: Test & Deploy Mukoko News

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Repo hygiene linters (file/format checks) ──────────────────────────────
  # These five matrix entries are the branch-protection required checks
  # (lint / actionlint, lint / JSON validity, lint / prettier, …). Keep their
  # names stable so the org ruleset keeps matching them.
  lint:
    runs-on: ubuntu-latest
    name: lint / ${{ matrix.check }}
    strategy:
      fail-fast: false
      matrix:
        check: [actionlint, "JSON validity", prettier, markdownlint, yamllint]

    steps:
    - uses: actions/checkout@v4

    - name: Run actionlint
      if: matrix.check == 'actionlint'
      uses: raven-actions/actionlint@v2

    - name: Validate JSON files
      if: matrix.check == 'JSON validity'
      run: |
        find . \
          -name "*.json" \
          -not -path "*/node_modules/*" \
          -not -path "*/.git/*" \
          -not -path "*/.next/*" \
          -not -path "*/.wrangler/*" \
          -not -path "*/.venv/*" \
          -not -path "*/dist/*" \
          | while read -r f; do
              python3 -m json.tool "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
            done

    - name: Setup Node.js
      if: matrix.check == 'prettier'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run prettier
      if: matrix.check == 'prettier'
      run: |
        npm install --no-save prettier@3
        npx prettier --check "**/*.json"

    - name: Run markdownlint
      if: matrix.check == 'markdownlint'
      uses: DavidAnson/markdownlint-cli2-action@v16
      with:
        globs: "**/*.md"

    - name: Run yamllint
      if: matrix.check == 'yamllint'
      run: |
        pip install yamllint
        yamllint -c .yamllint.yml .

  # ── Frontend pipeline ──────────────────────────────────────────────────────
  # Sequential stages (ESLint → Typecheck → Test → Build) so the Actions graph
  # shows a clear pipeline and pinpoints exactly which stage failed, instead of
  # bundling everything into one opaque job.
  eslint:
    runs-on: ubuntu-latest
    name: ESLint
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - name: Run ESLint
      run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    name: Typecheck
    needs: eslint
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - name: Run tsc --noEmit
      run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    name: Test
    needs: typecheck
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - name: Run Vitest
      run: npm run test

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - name: Build Next.js
      run: npm run build
