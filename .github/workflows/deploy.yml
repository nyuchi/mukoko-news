name: Test & Deploy Mukoko News

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: lint / ${{ matrix.check }}
    strategy:
      fail-fast: false
      matrix:
        check: [actionlint, "JSON validity", prettier, markdownlint, yamllint]

    steps:
    - uses: actions/checkout@v4

    - name: Run actionlint
      if: matrix.check == 'actionlint'
      uses: raven-actions/actionlint@v2

    - name: Validate JSON files
      if: matrix.check == 'JSON validity'
      run: |
        find . \
          -name "*.json" \
          -not -path "*/node_modules/*" \
          -not -path "*/.git/*" \
          -not -path "*/.next/*" \
          -not -path "*/.wrangler/*" \
          -not -path "*/.venv/*" \
          -not -path "*/dist/*" \
          | while read -r f; do
              python3 -m json.tool "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
            done

    - name: Setup Node.js
      if: matrix.check == 'prettier'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run prettier
      if: matrix.check == 'prettier'
      run: |
        npm install --no-save prettier@3
        npx prettier --check "**/*.json"

    - name: Run markdownlint
      if: matrix.check == 'markdownlint'
      uses: DavidAnson/markdownlint-cli2-action@v16
      with:
        globs: "**/*.md"

    - name: Run yamllint
      if: matrix.check == 'yamllint'
      run: |
        pip install yamllint
        yamllint -c .yamllint.yml .

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend (Next.js)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run frontend unit tests
      run: npm run test

    - name: Type check
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Build Next.js
      run: npm run build

  test-api:
    runs-on: ubuntu-latest
    name: Test Python API Worker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python dependencies
      run: |
        cd processing
        uv sync --group dev

    - name: Run Python tests
      run: |
        cd processing
        uv run pytest

    - name: Type check Python
      run: |
        cd processing
        uv run pyright

  test-fly-worker:
    runs-on: ubuntu-latest
    name: Test Fly.io Pipeline Worker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python dependencies
      run: |
        cd fly-worker
        uv sync --extra dev

    - name: Run Python tests
      run: |
        cd fly-worker
        uv run pytest

    - name: Type check Python
      run: |
        cd fly-worker
        uv run pyright

  test-image-worker:
    runs-on: ubuntu-latest
    name: Test Image Worker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'image-worker/package-lock.json'

    - name: Install dependencies
      run: |
        cd image-worker
        npm install

    - name: Type check
      run: |
        cd image-worker
        npm run typecheck

  test-fundi-enrichment:
    runs-on: ubuntu-latest
    name: Test Fundi News Enrichment Worker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'fundi-news-enrichment/package-lock.json'

    - name: Install dependencies
      run: |
        cd fundi-news-enrichment
        npm install

    - name: Type check
      run: |
        cd fundi-news-enrichment
        npm run typecheck

    - name: Validate build (dry-run)
      run: |
        cd fundi-news-enrichment
        npx wrangler deploy --dry-run

  deploy-fly-worker:
    name: Deploy Fly Worker (Pipeline)
    runs-on: ubuntu-latest
    needs: [test-frontend, test-api, test-fly-worker, test-image-worker, test-fundi-enrichment]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install flyctl
      uses: superfly/flyctl-actions/setup-flyctl@fc81e29fd4e64e6f02f29e69a0d4f09dc8e84af0  # v1.5

    - name: Deploy to Fly.io
      run: flyctl deploy --remote-only
      working-directory: fly-worker
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-tests:
    name: Smoke Tests — Live Endpoints
    runs-on: ubuntu-latest
    needs: [deploy-fly-worker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Wait for fly-worker to become healthy
      run: |
        for i in $(seq 1 12); do
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://news-ingestion.fly-worker.nyuchi.dev/health || echo "000")
          if [ "$STATUS" = "200" ]; then echo "fly-worker healthy"; break; fi
          echo "Attempt $i: status=$STATUS — waiting 10s..."
          sleep 10
        done
        [ "$STATUS" = "200" ] || { echo "fly-worker never became healthy"; exit 1; }

    - name: Fly-worker /health returns healthy status
      run: |
        BODY=$(curl -sf https://news-ingestion.fly-worker.nyuchi.dev/health)
        echo "$BODY"
        echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy', f'Expected healthy, got: {d}'"

    - name: Fly-worker /health reports MongoDB connected
      run: |
        BODY=$(curl -sf https://news-ingestion.fly-worker.nyuchi.dev/health)
        echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['mongodb']=='connected', f'MongoDB not connected: {d}'"

    - name: Backend /api/health returns 200
      run: |
        STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://news.mukoko.com/api/health)
        echo "Status: $STATUS"
        [ "$STATUS" = "200" ] || { echo "Backend health check failed: $STATUS"; exit 1; }

    - name: Backend /api/feeds returns articles
      run: |
        BODY=$(curl -sf "https://news.mukoko.com/api/feeds?limit=5")
        echo "$BODY" | python3 -c "
        import sys, json
        d = json.load(sys.stdin)
        articles = d.get('articles', d) if isinstance(d, dict) else d
        assert len(articles) > 0, f'No articles returned: {d}'
        print(f'Got {len(articles)} articles')
        "

    - name: Backend /api/categories returns data
      run: |
        BODY=$(curl -sf https://news.mukoko.com/api/categories)
        echo "$BODY" | python3 -c "
        import sys, json
        d = json.load(sys.stdin)
        items = d if isinstance(d, list) else d.get('categories', [])
        assert len(items) > 0, f'No categories returned: {d}'
        print(f'Got {len(items)} categories')
        "

    - name: Fundi enrichment worker /health returns ok
      run: |
        BODY=$(curl -sf https://news-enrichment.fundi.nyuchi.dev/health)
        echo "$BODY"
        echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', f'Unexpected: {d}'"


