name: Test & Deploy Mukoko News

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: lint / ${{ matrix.check }}
    strategy:
      fail-fast: false
      matrix:
        check: [actionlint, "JSON validity", prettier, markdownlint, yamllint]

    steps:
    - uses: actions/checkout@v4

    - name: Run actionlint
      if: matrix.check == 'actionlint'
      uses: raven-actions/actionlint@v2

    - name: Validate JSON files
      if: matrix.check == 'JSON validity'
      run: |
        find . \
          -name "*.json" \
          -not -path "*/node_modules/*" \
          -not -path "*/.git/*" \
          -not -path "*/.next/*" \
          -not -path "*/.wrangler/*" \
          -not -path "*/.venv/*" \
          -not -path "*/dist/*" \
          | while read -r f; do
              python3 -m json.tool "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
            done

    - name: Setup Node.js
      if: matrix.check == 'prettier'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run prettier
      if: matrix.check == 'prettier'
      run: |
        npm install --no-save prettier@3
        npx prettier --check "**/*.json"

    - name: Run markdownlint
      if: matrix.check == 'markdownlint'
      uses: DavidAnson/markdownlint-cli2-action@v16
      with:
        globs: "**/*.md"

    - name: Run yamllint
      if: matrix.check == 'yamllint'
      run: |
        pip install yamllint
        yamllint -c .yamllint.yml .

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend (Next.js)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run frontend unit tests
      run: npm run test

    - name: Type check
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Build Next.js
      run: npm run build
