name: Test & Deploy Mukoko News

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Restrict GITHUB_TOKEN permissions (principle of least privilege)
permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------------
  # Tests — run in parallel on every push and PR
  # ---------------------------------------------------------------------------

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend (Next.js)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run frontend unit tests
      run: npm run test

    - name: Type check
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Build Next.js
      run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js for backend
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Run backend unit tests
      run: |
        cd backend
        npm run test

    - name: Type check backend
      run: |
        cd backend
        npm run typecheck

    - name: Test backend build
      run: |
        cd backend
        npm run test:build

  test-api:
    runs-on: ubuntu-latest
    name: Test Python API Worker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python dependencies
      run: |
        cd processing
        uv sync --group dev

    - name: Run Python tests
      run: |
        cd processing
        uv run pytest

    - name: Type check Python
      run: |
        cd processing
        uv run pyright

  # ---------------------------------------------------------------------------
  # Deployments — push to main only, ordered by service-binding dependency:
  #   mongo-proxy  ->  Python Worker (MONGO service binding)
  #              ->  backend (DATA_PROCESSOR service binding)
  # ---------------------------------------------------------------------------

  deploy-mongo-proxy:
    runs-on: ubuntu-latest
    name: Deploy MongoDB Proxy Worker
    if: github.event_name == 'push'
    needs: [test-backend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'processing/mongo-proxy/package-lock.json'

    - name: Install mongo-proxy dependencies
      run: |
        cd processing/mongo-proxy
        npm ci

    - name: Deploy mongo-proxy to Cloudflare Workers
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        cd processing/mongo-proxy
        npx wrangler deploy

  deploy-python-worker:
    runs-on: ubuntu-latest
    name: Deploy Python API Worker
    if: github.event_name == 'push'
    needs: [test-api, deploy-mongo-proxy]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python dependencies
      run: |
        cd processing
        uv sync

    - name: Deploy Python Worker to Cloudflare Workers
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        cd processing
        uv run pywrangler deploy

  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend Worker
    if: github.event_name == 'push'
    needs: [test-backend, deploy-python-worker]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js for backend
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Deploy backend to Cloudflare Workers
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        cd backend
        npm run deploy

    - name: Health check
      run: |
        sleep 10
        curl --fail --silent --show-error \
          https://mukoko-news-backend.nyuchi.workers.dev/api/health
