name: Test & Deploy Mukoko News

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Restrict GITHUB_TOKEN permissions (principle of least privilege)
permissions:
  contents: read
  pull-requests: read

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend (Next.js)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run frontend unit tests
      run: npm run test

    - name: Type check
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Build Next.js
      run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js for backend
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Run backend unit tests
      run: |
        cd backend
        npm run test

    - name: Type check backend
      run: |
        cd backend
        npm run typecheck

    - name: Test backend build
      run: |
        cd backend
        npm run test:build

  test-api:
    runs-on: ubuntu-latest
    name: Test Python API Worker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python dependencies
      run: |
        cd processing
        uv sync --group dev

    - name: Run Python tests
      run: |
        cd processing
        uv run pytest

    - name: Type check Python
      run: |
        cd processing
        uv run pyright

  deploy-fly-worker:
    name: Deploy Fly Worker (Pipeline)
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install flyctl
      uses: superfly/flyctl-actions/setup-flyctl@fc81e29fd4e64e6f02f29e69a0d4f09dc8e84af0  # v1.5

    - name: Deploy to Fly.io
      run: flyctl deploy --remote-only
      working-directory: fly-worker
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
