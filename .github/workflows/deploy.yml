name: Test & Deploy Mukoko News

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Default: least privilege. The publish-mcp-package job overrides with id-token: write.
permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: lint / ${{ matrix.check }}
    strategy:
      fail-fast: false
      matrix:
        check: [actionlint, "JSON validity", prettier, markdownlint, yamllint]

    steps:
    - uses: actions/checkout@v4

    - name: Run actionlint
      if: matrix.check == 'actionlint'
      uses: raven-actions/actionlint@v2

    - name: Validate JSON files
      if: matrix.check == 'JSON validity'
      run: |
        find . \
          -name "*.json" \
          -not -path "*/node_modules/*" \
          -not -path "*/.git/*" \
          -not -path "*/.next/*" \
          -not -path "*/.wrangler/*" \
          -not -path "*/.venv/*" \
          -not -path "*/dist/*" \
          | while read -r f; do
              python3 -m json.tool "$f" > /dev/null || { echo "Invalid JSON: $f"; exit 1; }
            done

    - name: Setup Node.js
      if: matrix.check == 'prettier'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run prettier
      if: matrix.check == 'prettier'
      run: |
        npm install --no-save prettier@3
        npx prettier --check "**/*.json"

    - name: Run markdownlint
      if: matrix.check == 'markdownlint'
      uses: DavidAnson/markdownlint-cli2-action@v16
      with:
        globs: "**/*.md"

    - name: Run yamllint
      if: matrix.check == 'yamllint'
      run: |
        pip install yamllint
        yamllint -c .yamllint.yml .

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend (Next.js)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run frontend unit tests
      run: npm run test

    - name: Type check
      run: npm run typecheck

    - name: Lint
      run: npm run lint

    - name: Build Next.js
      run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js for backend
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Run backend unit tests
      run: |
        cd backend
        npm run test

    - name: Type check backend
      run: |
        cd backend
        npm run typecheck

    - name: Test backend build
      run: |
        cd backend
        npm run test:build

  test-api:
    runs-on: ubuntu-latest
    name: Test Python API Worker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python dependencies
      run: |
        cd processing
        uv sync --group dev

    - name: Run Python tests
      run: |
        cd processing
        uv run pytest

    - name: Type check Python
      run: |
        cd processing
        uv run pyright

  test-fly-worker:
    runs-on: ubuntu-latest
    name: Test Fly.io Pipeline Worker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python dependencies
      run: |
        cd fly-worker
        uv sync --extra dev

    - name: Run Python tests
      run: |
        cd fly-worker
        uv run pytest

    - name: Type check Python
      run: |
        cd fly-worker
        uv run pyright

  deploy-fly-worker:
    name: Deploy Fly Worker (Pipeline)
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-api, test-fly-worker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install flyctl
      uses: superfly/flyctl-actions/setup-flyctl@fc81e29fd4e64e6f02f29e69a0d4f09dc8e84af0  # v1.5

    - name: Deploy to Fly.io
      run: flyctl deploy --remote-only
      working-directory: fly-worker
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  publish-mcp-package:
    name: Publish @nyuchi/mukoko-news-mcp to npm + MCP Registry
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-api, test-fly-worker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write  # Required for MCP Registry OIDC auth

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Setup Node.js with npm registry auth
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Publish to npm if version is new
      id: npm-publish
      working-directory: mcp-package
      run: |
        CURRENT=$(node -p "require('./package.json').version")
        PUBLISHED=$(npm view @nyuchi/mukoko-news-mcp version 2>/dev/null || echo "")
        if [ "$CURRENT" != "$PUBLISHED" ]; then
          echo "Publishing version $CURRENT to npm"
          npm publish --access public
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
        else
          echo "Version $CURRENT already on npm — skipping"
          echo "published=false" >> "$GITHUB_OUTPUT"
        fi
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Install mcp-publisher
      if: steps.npm-publish.outputs.published == 'true'
      run: |
        curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
          | tar xz mcp-publisher
        sudo mv mcp-publisher /usr/local/bin/

    - name: Authenticate to MCP Registry (OIDC)
      if: steps.npm-publish.outputs.published == 'true'
      working-directory: mcp-package
      run: mcp-publisher login github-oidc

    - name: Update server.json version and publish to MCP Registry
      if: steps.npm-publish.outputs.published == 'true'
      working-directory: mcp-package
      run: |
        VERSION=${{ steps.npm-publish.outputs.version }}
        jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json \
          > server.tmp && mv server.tmp server.json
        mcp-publisher publish

