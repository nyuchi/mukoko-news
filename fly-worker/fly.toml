app = "mukoko-news"
primary_region = "jnb"

# Custom domain: news-ingestion.fly-worker.nyuchi.dev
# Set up: flyctl certs add news-ingestion.fly-worker.nyuchi.dev
# DNS: CNAME news-ingestion.fly-worker.nyuchi.dev → mukoko-news-api.fly.dev

[build]

[env]
  # Non-secret env vars. Secrets set via: fly secrets set KEY=VALUE
  LOG_LEVEL = "info"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 1
